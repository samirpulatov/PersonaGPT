<!DOCTYPE html>
<html lang="en" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — PersonaGPT</title>
    <meta name="description" content="Sign in to your PersonaGPT account.">

    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<header class="header">
    <div class="container">
        <div class="header__inner">
            <a class="brand" href="/" aria-label="Go to home">
                <span class="brand__logo">P</span>
                <span>PersonaGPT</span>
            </a>

            <div style="display:flex; gap:10px;">
                <a class="btn btn--ghost" href="/sign_up">Sign up</a>
            </div>
        </div>
    </div>
</header>

<main class="auth">
    <div class="container">
        <div class="auth__wrap">
            <div class="auth__head">
                <h1 class="auth__title">Sign in to <span class="display">PersonaGPT</span></h1>
                <p class="auth__hint">
                    Welcome back! Use your email or username to sign in.
                </p>
            </div>

            <div class="card">
                <span
                        id="reqIndicator"
                        class="req-indicator"
                        title="All fields are required"
                        aria-label="All fields are required"
                >*</span>

                <div class="card__pad">
                    <form id="signinForm" class="form"  novalidate>
                        <div class="form__grid">
                            <div class="form__row form__row--full">
                                <label for="login">Email or Username</label>
                                <input class="input" id="login" name="login" type="text" autocomplete="username" placeholder="you@example.com or your_username" required>
                            </div>

                            <div class="form__row form__row--full">
                                <label for="password">Password</label>
                                <input class="input" id="password" name="password" type="password" autocomplete="current-password" minlength="6" required>
                            </div>
                        </div>

                        <div class="form__actions">
                            <!-- 🔴 ERROR MESSAGE -->
                            <div id="formMessage" class="form__alert" style="display:none;" role="alert"></div>
                            <button class="btn btn--primary btn--block" type="submit">Sign in ➔</button>
                            <div class="small-link">
                                Don't have an account? <a href="/sign_up">Sign up</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</main>

<footer class="footer">
    <div class="container">
        <div class="footer__row">
            <div>© <span id="y"></span> PersonaGPT</div>
            <div style="display:flex; gap:12px;">
                <a href="/">Home</a>
                <a href="/sign_up">Sign up</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('y').textContent = new Date().getFullYear();

        const form = document.getElementById('signinForm');
        const indicator = document.getElementById('reqIndicator');
        const submitBtn = form.querySelector('button');
        const formMessage = document.getElementById('formMessage');

        function showMessage(message, isError = true) {
            formMessage.style.display = 'block';
            formMessage.textContent = message;
            formMessage.className = isError
                ? 'form__alert form__alert--error'
                : 'form__alert form__alert--success';
        }

        function clearMessage() {
            formMessage.style.display = 'none';
            formMessage.textContent = '';
        }

        function markInvalidFields() {
            const fields = form.querySelectorAll('input');
            let hasInvalid = false;

            fields.forEach(field => {
                const label = form.querySelector(`label[for="${field.id}"]`);
                const invalid = !field.checkValidity();

                if (invalid) {
                    hasInvalid = true;
                    field.classList.add('is-invalid');
                    if (label) label.classList.add('label-invalid');
                }
            });

            return hasInvalid;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearMessage();

            if (markInvalidFields()) return;

            const payload = {
                login: document.getElementById('login').value.trim(),
                password: document.getElementById('password').value
            };

            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';

            try {
                const response = await fetch('http://localhost:8080/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    if (data.token) {
                        localStorage.setItem('token', data.token);
                    }

                    const token = localStorage.getItem('token');

                    const pdfResponse = await fetch('http://localhost:8080/api/documents/me/upload/hasDocument', {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    const pdfData = await pdfResponse.json();

                    if (!pdfData.hasDocument) {
                        window.location.href = '/documents/upload';
                    }

                } else {
                    showMessage(data.message || 'Invalid credentials');
                }

            } catch (error) {
                showMessage('Server error. Try again later.');
                console.error(error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign in ➔';
            }
        });
    </script>
</footer>
</body>
</html>
