<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up — PersonaGPT</title>
    <meta name="description" content="Create your PersonaGPT account. Choose a role: Recruiter or Job seeker.">

    <link rel="stylesheet" href="/css/styles.css" th:href="@{/css/styles.css}">
</head>
<body>
<header class="header">
    <div class="container">
        <div class="header__inner">
            <a class="brand" href="/" aria-label="Go to home">
                <span class="logo" aria-hidden="true"></span>
                <span class="brand__name">PersonaGPT</span>
            </a>

            <div style="display:flex; gap:10px;">
                <a class="btn btn--ghost" th:href="@{/auth/login}">Sign in</a>
            </div>
        </div>
    </div>
</header>

<main class="auth">
    <div class="container">
        <div class="auth__wrap">
            <div class="auth__head">
                <h1 class="auth__title">Create your <span class="display">PersonaGPT</span> account</h1>
                <p class="auth__hint">
                    Sign up to turn a LinkedIn PDF into an AI-powered chat that helps recruiters and job seekers move faster.
                </p>
            </div>

            <div class="card">
                <span
                        id="reqIndicator"
                        class="req-indicator"
                        title="All fields are required"
                        aria-label="All fields are required"
                >*</span>

                <div class="card__pad">




                    <form id="signupForm" class="form" method="post" th:action="@{/auth/register}" th:object="${form}" novalidate>
                        <div class="form__grid">
                            <div class="form__row">
                                <label for="firstName">First name</label>
                                <input class="input"
                                       id="firstName"
                                       th:field="*{firstName}"
                                       th:classappend="${#fields.hasErrors('firstName')} ? ' is-invalid' : ''"
                                       type="text"
                                       autocomplete="given-name"
                                       minlength="2"
                                       maxlength="50"
                                       required>
                                <div id="firstNameError"
                                     class="field-error"
                                     th:text="${#fields.hasErrors('firstName') ? #fields.errors('firstName')[0] : ''}">
                                </div>
                            </div>


                            <div class="form__row">
                                <label for="lastName">Last name</label>
                                <input class="input"
                                       id="lastName"
                                       th:field="*{lastName}"
                                       th:classappend="${#fields.hasErrors('lastName')} ? ' is-invalid' : ''"
                                       type="text"
                                       autocomplete="family-name"
                                       minlength="2"
                                       maxlength="50"
                                       required>
                                <div id="lastNameError"
                                     class="field-error"
                                     th:text="${#fields.hasErrors('lastName') ? #fields.errors('lastName')[0] : ''}">
                                </div>
                            </div>

                            <div class="form__row form__row--full">
                                <label for="email">Email</label>
                                <input class="input"
                                       id="email"
                                       th:field="*{email}"
                                       th:classappend="${#fields.hasErrors('email')} ? ' is-invalid' : ''"
                                       type="email"
                                       autocomplete="email"
                                       required>
                                <div id="emailError"
                                     class="field-error"
                                     th:text="${#fields.hasErrors('email') ? #fields.errors('email')[0] : ''}">
                                </div>
                            </div>

                            <div class="form__row form__row--full">
                                <label for="username">Username</label>
                                <input class="input"
                                       id="username"
                                       th:field="*{username}"
                                       th:classappend="${#fields.hasErrors('username')} ? ' is-invalid' : ''"
                                       type="text"
                                       autocomplete="username"
                                       minlength="3"
                                       maxlength="50"
                                       required>
                                <div id="usernameError"
                                     class="field-error"
                                     th:text="${#fields.hasErrors('username') ? #fields.errors('username')[0] : ''}">
                                </div>
                            </div>


                            <div class="form__row form__row--full">
                                <label for="password">Password</label>
                                <input class="input" id="password"
                                       th:field="*{password}"
                                       th:classappend="${#fields.hasErrors('password')} ? ' is-invalid' : ''"
                                       type="password"
                                       autocomplete="new-password"
                                       minlength="6"
                                       maxlength="15"
                                       required>
                                <div id="passwordError"
                                     class="field-error"
                                     th:text="${#fields.hasErrors('password') ? #fields.errors('password')[0] : ''}">
                                </div>
                            </div>

                            <div class="form__row form__row--full">
                                <label for="accountType">Account Type</label>
                                <select id="accountType"
                                        th:field="*{accountType}"
                                        th:classappend="${#fields.hasErrors('accountType')} ? ' is-invalid' : ''"
                                        required>
                                    <option value="" disabled>Select your account type</option>
                                    <option value="RECRUITER">Recruiter</option>
                                    <option value="JOB_SEEKER">Job seeker</option>
                                </select>
                                <div id="accountTypeError"
                                     class="field-error"
                                     th:text="${#fields.hasErrors('accountType') ? #fields.errors('accountType')[0] : ''}">
                                </div>
                            </div>
                        </div>

                        <div class="form__actions">
                            <!-- 🔴 ERROR MESSAGE -->
                            <div th:if="${errorMessage}"
                                 class="form__alert form__alert--error"
                                 role="alert"
                                 th:text="${errorMessage}">
                            </div>

                            <button class="btn btn--primary btn--block" type="submit">Next ➔
                            </button>
                            <div class="small-link">
                                Already have an account? <a th:href="@{/auth/login}">Sign in</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</main>

<footer class="footer">
    <div class="container">
        <div class="footer__row">
            <div>© <span id="y"></span> PersonaGPT</div>
            <div style="display:flex; gap:12px;">
                <a href="/">Home</a>
                <a th:href="@{/auth/login}">Sign in</a>
            </div>
        </div>
    </div>


    <script>
        document.getElementById('y').textContent = new Date().getFullYear();

        const form = document.getElementById('signupForm');
        const indicator = document.getElementById('reqIndicator');

        function getFields() {
            return Array.from(form.querySelectorAll('input, select, textarea'));
        }

        function getErrorElement(field) {
            return document.getElementById(field.id + 'Error');
        }

        function getClientErrorMessage(field) {
            if (field.validity.valueMissing) {
                if (field.id === 'firstName') return 'First name is required';
                if (field.id === 'lastName') return 'Last name is required';
                if (field.id === 'username') return 'Username is required';
                if (field.id === 'email') return 'Email is required';
                if (field.id === 'password') return 'Password is required';
                if (field.id === 'accountType') return 'Please select an account type';
                return 'This field is required';
            }

            if (field.validity.typeMismatch && field.id === 'email') {
                return 'Please enter a valid email address';
            }

            if (field.validity.tooShort || field.validity.tooLong) {
                if (field.id === 'firstName') return 'First name must be between 2 and 50 characters';
                if (field.id === 'lastName') return 'Last name must be between 2 and 50 characters';
                if (field.id === 'username') return 'Username must be between 3 and 50 characters';
                if (field.id === 'password') return 'Password must be between 6 and 15 characters';
            }

            return '';
        }

        function updateIndicator() {
            const hasInvalid = getFields().some(field => field.classList.contains('is-invalid'));
            indicator.classList.toggle('req-indicator--on', hasInvalid);
            indicator.title = hasInvalid ? 'Please fix the highlighted fields' : 'All fields are required';
        }

        function markFieldInvalid(field, message = '') {
            const label = form.querySelector(`label[for="${field.id}"]`);
            const errorEl = getErrorElement(field);

            field.classList.add('is-invalid');

            if (label) {
                label.classList.add('label-invalid');
            }

            if (errorEl) {
                errorEl.textContent = message;
            }
        }

        function clearFieldInvalid(field) {
            const label = form.querySelector(`label[for="${field.id}"]`);
            const errorEl = getErrorElement(field);

            field.classList.remove('is-invalid');

            if (label) {
                label.classList.remove('label-invalid');
            }

            if (errorEl) {
                errorEl.textContent = '';
            }
        }

        function markClientInvalidFields() {
            let hasInvalid = false;

            getFields().forEach(field => {
                if (!field.checkValidity()) {
                    markFieldInvalid(field, getClientErrorMessage(field));
                    hasInvalid = true;
                }
            });

            updateIndicator();
            return hasInvalid;
        }

        function applyServerValidationState() {
            getFields().forEach(field => {
                if (field.classList.contains('is-invalid')) {
                    const label = form.querySelector(`label[for="${field.id}"]`);
                    if (label) {
                        label.classList.add('label-invalid');
                    }
                }
            });

            updateIndicator();
        }

        function validateSingleField(field) {
            if (field.checkValidity()) {
                clearFieldInvalid(field);
            } else {
                markFieldInvalid(field, getClientErrorMessage(field));
            }

            updateIndicator();
        }

        form.addEventListener('submit', (e) => {
            const hasClientErrors = markClientInvalidFields();

            if (hasClientErrors) {
                e.preventDefault();
            }
        });

        form.addEventListener('input', (e) => {
            const field = e.target;
            if (!(field instanceof HTMLInputElement || field instanceof HTMLTextAreaElement || field instanceof HTMLSelectElement)) {
                return;
            }

            validateSingleField(field);
        });

        form.addEventListener('change', (e) => {
            const field = e.target;
            if (!(field instanceof HTMLInputElement || field instanceof HTMLTextAreaElement || field instanceof HTMLSelectElement)) {
                return;
            }

            validateSingleField(field);
        });

        applyServerValidationState();
    </script>
</footer>
</body>
</html>
